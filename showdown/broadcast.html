<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Prism Broadcast</title>
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  iframe { position: fixed; inset: 0; width: 100%; height: 100%; border: 0; }
  /* the battle sits underneath; the caption layer is transparent and
     click-through so the battle below stays fully interactive */
  #battle  { z-index: 0; }
  #caption { z-index: 1; background: transparent; pointer-events: none; }
  #hint {
    position: fixed; inset: 0; display: flex; align-items: center;
    justify-content: center; color: #8aa; font: 16px system-ui;
    background: #0b0e14; z-index: 2; text-align: center; padding: 2rem;
  }
</style>
</head>
<body>
  <iframe id="battle" title="battle"></iframe>
  <iframe id="caption" src="/overlay.html" title="commentary"></iframe>
  <div id="hint">Add <code>?battle=battle-gen9ou-NNNN</code> to the URL to load a match.</div>
<script>
  // Single self-hosted page: the local Showdown battle embedded, with the
  // Prism caption composited over it from the WS feed. No Showdown login,
  // no server patch. Local-server only (psim.us forbids framing).
  const room = new URLSearchParams(location.search).get("battle");
  if (room) {
    const server = new URLSearchParams(location.search).get("server")
                   || "http://localhost:8000";
    document.getElementById("battle").src = server.replace(/\/$/, "") + "/" + room;
    document.getElementById("hint").style.display = "none";
  }
</script>
</body>
</html>
