# Commentary gold set — EXECUTABLE starter entries.
#
# Derived from the design drafts (~/Documents/commentator-project/latest/
# gold-set-draft.yaml); ids are kept so entries map back to the full spec.
# Each entry here carries an inline `fixture` (protocol batches + decision
# contexts) instead of a pinned replay — the drafts' replay refs are all
# TODO-verify, and fixtures make the set runnable and deterministic today.
# A `replay:` loader can join later without changing the schema.
#
# Run:  .venv/bin/python showdown/commentary_eval.py            (director level)
#       .venv/bin/python showdown/commentary_eval.py --level caster
#
# Schema (director level checks marked D, caster level C):
#   beat / persona / priority / register / handoff   (D: the Beat must match)
#   silence: true                (D: the decision must produce NO text)
#   must_mention: [...]          (D: in Decision.text; C: in the spoken line;
#                                 "a|b" = alternation, case-insensitive)
#   must_mention_gremlin/_analyst (C: per-voice checks on dual beats)
#   forbid: [...]                (C: plain substrings; special tokens:
#                                 ungrounded_entity, statistics_or_citations)
#   fixture.role                 our player slot ('p1'/'p2')
#   fixture.batches              protocol message batches -> ProtocolScanner
#   fixture.ctx                  one decide() call per entry, in order;
#                                the LAST decision is the one evaluated

# --- status: burn (allegiance + phys/special split; gc-0003/4/5) -----------

- id: gc-0003
  beat: status
  persona: gremlin
  priority: interrupt
  register: despair
  must_mention: ["Kingambit", "burn"]
  forbid: [statistics_or_citations]
  fixture:
    role: p1
    batches:
      - - ["", "move", "p2a: Rotom-Wash", "Will-O-Wisp", "p1a: Kingambit"]
        - ["", "-status", "p1a: Kingambit", "brn"]
    ctx:
      - {turn: 12, value: 0.5, elapsed: 30.0, me_name: Kingambit, me_hp: 90,
         opp_name: Rotom-Wash, opp_hp: 100}

