# --- hazards: clear grievance + Court Change (gc-0016/17) ------------------

- id: gc-0016
  beat: hazards
  persona: gremlin
  priority: interrupt
  register: sunk-cost-outrage
  must_mention: ["Spikes", "spin|cleared"]
  forbid: [statistics_or_citations]
  fixture:
    role: p1
    batches:
      - - ["", "move", "p2a: Great Tusk", "Rapid Spin", "p1a: Gholdengo"]
        - ["", "-sideend", "p1: wiz", "Spikes", "[from] move: Rapid Spin"]
    ctx:
      - {turn: 18, value: 0.5, elapsed: 30.0, me_name: Gholdengo, me_hp: 70,
         opp_name: Great Tusk, opp_hp: 55}

- id: gc-0017
  beat: hazards
  persona: both
  priority: interrupt
  register: heist
  handoff: [gremlin, analyst]
  # facts frozen, wording free (template rule): the gremlin must reference
  # the stolen work, the analyst the sides changing — first caster-level
  # run produced correct facts in wording outside narrower lists
  # ("everything we built just got teleported", "identical, just mirrored")
  must_mention: ["court change|swap|mirror|teleport|stole|heist|flip"]
  must_mention_gremlin: ["hazard|spikes|rocks|built|stole|heist|teleport"]
  must_mention_analyst: ["swap|flip|reversed|mirror|side|reset"]
  fixture:
    role: p1
    batches:
      - - ["", "move", "p2a: Cinderace", "Court Change", "p1a: Gholdengo"]
        - ["", "-swapsideconditions"]
    ctx:
      - {turn: 14, value: 0.45, elapsed: 30.0, me_name: Gholdengo, me_hp: 70,
         opp_name: Cinderace, opp_hp: 88}

