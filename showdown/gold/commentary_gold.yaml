# --- desk contradiction (gc-0032-family, the implemented variant) ----------

- id: gc-0032
  beat: desk_contradiction
  persona: analyst
  priority: interrupt
  # the flagship: BOTH sides of the contradiction spoken — the deficit AND
  # the lean. Facts, not the word "disagree" ("we're down three Pokemon to
  # six; the search still sees a clear path" passes)
  must_mention: ["down|trail|deficit|bodies", "sees|path|favors|edge|upbeat"]
  fixture:
    role: p1
    batches:
      - - ["", "move", "p2a: Kingambit", "Sucker Punch", "p1a: Darkrai"]
        - ["", "-damage", "p1a: Darkrai", "0 fnt"]
        - ["", "faint", "p1a: Darkrai"]
    ctx:
      - {turn: 23, value: 0.65, elapsed: 30.0, me_name: Gliscor, me_hp: 60,
         opp_name: Kingambit, opp_hp: 49,
         ours_fainted: [Darkrai, Ting-Lu, Zamazenta]}

